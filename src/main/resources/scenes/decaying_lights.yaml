# Decaying Light Scene
# Demonstrates DecayingPointLight with distance-based intensity falloff

materials:
  chrome:
    color: !color {r: 0.9, g: 0.9, b: 0.9}
    kAmbient: !reflect {r: 0.15, g: 0.15, b: 0.15}
    kDiffuse: !reflect {r: 0.6, g: 0.6, b: 0.6}
    kSpecular: !reflect {r: 1.0, g: 1.0, b: 1.0}
  
  redShiny:
    color: !color {r: 1.0, g: 0.1, b: 0.1}
    kAmbient: !reflect {r: 0.1, g: 0.1, b: 0.1}
    kDiffuse: !reflect {r: 0.7, g: 0.7, b: 0.7}
    kSpecular: !reflect {r: 0.9, g: 0.9, b: 0.9}
  
  floor:
    color: !color {r: 0.3, g: 0.3, b: 0.35}
    kAmbient: !reflect {r: 0.1, g: 0.1, b: 0.1}
    kDiffuse: !reflect {r: 0.8, g: 0.8, b: 0.8}

scene:
  backgroundColor: !color {r: 0.0, g: 0.0, b: 0.0}
  
  camera:
    type: PinHoleCamera
    eye: !pt {x: 0.0, y: 40.0, z: 120.0}
    lookAt: !pt {x: 0.0, y: 0.0, z: 0.0}
    up: !vector {x: 0.0, y: 1.0, z: 0.0}
    zoomFactor: 10.0
  
  objects:
    - type: Sphere
      center: !pt {x: 0.0, y: 0.0, z: 0.0}
      radius: 15.0
      material: $chrome
    
    - type: Sphere
      center: !pt {x: 40.0, y: 0.0, z: 0.0}
      radius: 15.0
      material: $redShiny
    
    - type: Sphere
      center: !pt {x: -40.0, y: 0.0, z: 0.0}
      radius: 15.0
      material: $redShiny
    
    # Floor
    - type: Plane
      point: !pt {x: 0.0, y: -20.0, z: 0.0}
      normal: !vector {x: 0.0, y: 1.0, z: 0.0}
      material: $floor
  
  lights:
    # Close light - strong but decays quickly
    - type: DecayingPointLight
      position: !pt {x: 0.0, y: 60.0, z: 30.0}
      color: !color {r: 1.0, g: 0.9, b: 0.7}
      initialIntensity: 200.0
    
    # Far light - weaker but decays slowly
    - type: DecayingPointLight
      position: !pt {x: -80.0, y: 80.0, z: 80.0}
      color: !color {r: 0.7, g: 0.8, b: 1.0}
      initialIntensity: 300.0

tracer:
  type: Tracer
  shaders:
    - type: AmbientShader
    - type: DiffuseShader
    - type: SpecularShader
      specularFactor: 128.0
  interceptors:
    - type: ShadowInterceptor

viewPlane:
  hres: 1024
  vres: 768
