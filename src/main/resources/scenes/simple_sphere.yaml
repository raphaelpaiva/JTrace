# Simple Sphere Scene
# Basic example with a single sphere and one light

materials:
  whiteMatte:
    color: !color {r: 1.0, g: 1.0, b: 1.0}
    kAmbient: !reflect {r: 0.1, g: 0.1, b: 0.1}
    kDiffuse: !reflect {r: 0.9, g: 0.9, b: 0.9}

scene:
  backgroundColor: !color {r: 0.0, g: 0.0, b: 0.0}
  
  camera:
    type: PinHoleCamera
    eye: !pt {x: 0.0, y: 0.0, z: 100.0}
    lookAt: !pt {x: 0.0, y: 0.0, z: 0.0}
    up: !vector {x: 0.0, y: 1.0, z: 0.0}
    zoomFactor: 10.0
  
  objects:
    - type: Sphere
      center: !pt {x: 0.0, y: 0.0, z: 0.0}
      radius: 20.0
      material: $whiteMatte
  
  lights:
    - type: PointLight
      position: !pt {x: 50.0, y: 50.0, z: 50.0}

tracer:
  type: Tracer
  shaders:
    - type: AmbientShader
    - type: DiffuseShader

viewPlane:
  hres: 640
  vres: 480
